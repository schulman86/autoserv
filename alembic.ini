# alembic.ini
# DATABASE_URL переопределяется из env в migrations/env.py

[alembic]
script_location = common/migrations
version_locations = common/migrations/versions
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 40
timezone = UTC

# Подключение — берётся из DATABASE_URL окружения (см. migrations/env.py)
# Для локального запуска без .env можно указать здесь:
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/autoservice

[post_write_hooks]
# Автоформатирование сгенерированных миграций
hooks = ruff
ruff.type = exec
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
